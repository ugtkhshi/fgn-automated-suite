name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          npm ci
      - name: Install browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        name: Run Playwright tests (Xvfb) run: | sudo apt-get update sudo apt-get install -y xvfb xvfb-run -s "-screen 0 1280x720x24" npx playwright test --reporter=list